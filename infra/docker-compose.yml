# infra/docker-compose.yml
version: '3.8'

services:
  # AI Orchestrator & RTDE Bridge
  robot-controller:
    build:
      context: ..
      dockerfile: infra/Dockerfile
    volumes:
      - ../src:/app/src
      - ../config:/app/config
    environment:
      - ROBOT_MODE=SIM # REAL로 변경 시 실기체 연결
      - ROBOT_IP=192.168.1.100
    network_mode: "host" # RTDE 통신을 위해 호스트 네트워크 사용
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  # Isaac Sim (Simulation Environment)
  isaac-sim:
    image: nvcr.io/nvidia/isaac-sim:2023.1.1
    entrypoint: ["/bin/bash", "-c", "./runheadless.native.sh"]
    network_mode: "host"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8211/health"]
      interval: 30s
      timeout: 10s
      retries: 3